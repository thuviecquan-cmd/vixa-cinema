<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIXA - Premium AI Cinematic</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff96;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Header Logo */
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 10, 0.9); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-size: 2rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; }
        .logo span { color: #fff; }
        
        /* Khu vực giới thiệu (Hero) */
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(180deg, rgba(0,255,150,0.05) 0%, rgba(10,10,10,1) 100%); }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }
        .hero p { color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        
        /* Bố cục lưới Video (Chuẩn Netflix/Youtube) */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section-title { font-size: 1.5rem; margin-bottom: 25px; border-left: 4px solid var(--primary); padding-left: 10px; font-weight: 600; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        /* Thẻ Video */
        .video-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: all 0.3s ease; border: 1px solid #222; }
        .video-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0, 255, 150, 0.15); border-color: #444; }
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 18px; }
        .video-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
        .meta-item i { margin-right: 5px; color: var(--primary); }
        
        /* Hiệu ứng tải/Chưa có video */
        .message { text-align: center; padding: 50px; color: var(--text-muted); font-size: 1.2rem; grid-column: 1 / -1; }
        
        /* Chân trang */
        footer { text-align: center; padding: 30px; border-top: 1px solid #222; color: var(--text-muted); margin-top: 50px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">VIXA<span>.AI</span></div>
        <div style="color: var(--text-muted); font-weight: 600; letter-spacing: 1px;">PREMIUM GALLERY</div>
    </header>

    <div class="hero">
        <h1>Next-Gen AI Cinema</h1>
        <p>Trải nghiệm hình ảnh vượt giới hạn thực tại. Được kiến tạo bởi trí tuệ nhân tạo và sức mạnh của hệ thống X79 đa luồng.</p>
    </div>

    <div class="container">
        <h2 class="section-title">Xu hướng (Trending)</h2>
        <div id="video-list" class="video-grid">
            <div class="message"><i class="fas fa-circle-notch fa-spin"></i> Đang tải dữ liệu từ máy chủ Supabase...</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 VIXA AI Cinema. Hệ thống tự động hóa bởi Anh Quân.</p>
    </footer>

    <script>
        // === 3 CHÌA KHÓA CỦA CHỦ TỊCH ===
        const SB_URL = 'https://bgsmnkeglqwfynjtrhgh.supabase.co'; 
        const SB_KEY = 'sb_publishable_BzO7EWiD4MhUAEEhA74zmw_6NblJL07';
        const ADS_LINK = 'https://www.effectivegatecpm.com/gn2n2v8eyx?key=6269ca8c008348158df2be23b0779920';
        // =================================

        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function getVideos() {
            const list = document.getElementById('video-list');
            
            try {
                // Lấy video và sắp xếp mới nhất lên đầu
                let { data: videos, error } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
                
                if (error) throw error;

                if (!videos || videos.length === 0) {
                    list.innerHTML = `<div class="message"><i class="fas fa-film fa-2x" style="margin-bottom:15px; display:block; color:#444;"></i> Kho video đang trống. Anh Quân hãy vào Supabase (Mục Table Editor) thêm link video nhé!</div>`;
                    return;
                }

                list.innerHTML = ''; // Xóa chữ loading
                
                videos.forEach(v => {
                    // Xử lý views: Nếu null thì hiện 0, cộng thêm view ngẫu nhiên cho đẹp mắt
                    let displayViews = v.views_count || Math.floor(Math.random() * 500) + 100;

                    list.innerHTML += `
                        <div class="video-card">
                            <div class="video-wrapper">
                                <video controls src="${v.video_url}" onplay="window.open('${ADS_LINK}', '_blank')"></video>
                            </div>
                            <div class="video-info">
                                <div class="video-title">${v.title}</div>
                                <div class="video-meta">
                                    <span class="meta-item"><i class="fas fa-eye"></i> ${displayViews} views</span>
                                    <span class="meta-item"><i class="fas fa-fire"></i> Hot</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                list.innerHTML = `<div class="message" style="color: #ff4444;"><i class="fas fa-exclamation-triangle"></i> Lỗi kết nối: ${err.message}</div>`;
            }
        }
        
        getVideos();
    </script>
</body>
</html>
